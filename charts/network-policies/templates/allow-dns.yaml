{{- if .Values.allowDNS.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "network-policies.fullname" . }}-allow-dns
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{ .Values.allowDNS.namespaceLabel.key }}: {{ .Values.allowDNS.namespaceLabel.value }}
      ports:
        - port: {{ .Values.allowDNS.port }}
          protocol: UDP
        - port: {{ .Values.allowDNS.port }}
          protocol: TCP
  policyTypes:
    - Egress
{{- end }}
