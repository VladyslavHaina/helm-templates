{{- if .Values.allowFromServiceMesh.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "network-policies.fullname" . }}-allow-from-service-mesh
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.allowFromServiceMesh.namespaceLabel.key }}: {{ .Values.allowFromServiceMesh.namespaceLabel.value }}
  policyTypes:
    - Ingress
{{- end }}
