{{- range .Values.allowEgressTo }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "network-policies.fullname" $ }}-{{ .name }}
  labels:
    {{- include "network-policies.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector:
            {{- toYaml .namespaceSelector | nindent 12 }}
          {{- if .podSelector }}
          podSelector:
            {{- toYaml .podSelector | nindent 12 }}
          {{- end }}
      {{- with .ports }}
      ports:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  policyTypes:
    - Egress
{{- end }}
