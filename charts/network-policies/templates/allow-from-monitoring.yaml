{{- if .Values.allowFromMonitoring.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "network-policies.fullname" . }}-allow-from-monitoring
  labels:
    {{- include "network-policies.labels" . | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.allowFromMonitoring.namespaceLabel.key }}: {{ .Values.allowFromMonitoring.namespaceLabel.value }}
      {{- with .Values.allowFromMonitoring.ports }}
      ports:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  policyTypes:
    - Ingress
{{- end }}
