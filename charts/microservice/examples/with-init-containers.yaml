# Microservice with init containers, sidecars, and extra volumes
# Usage: helm install my-api ../microservice -f with-init-containers.yaml

app:
  name: backend-api

image:
  repository: my-registry/backend-api
  tag: "4.0.0"

replicaCount: 2

# -- Wait for database before starting
initContainers:
  - name: wait-for-db
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        until nc -z postgres-primary.database.svc.cluster.local 5432; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
        echo "PostgreSQL is ready."
  - name: run-migrations
    image: my-registry/backend-api:4.0.0
    command: ["./migrate", "--up"]
    env:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: db-credentials
            key: url

# -- Sidecar for log shipping
extraContainers:
  - name: fluentbit
    image: fluent/fluent-bit:3.0
    volumeMounts:
      - name: shared-logs
        mountPath: /var/log/app
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# -- Shared volume between main container and sidecar
extraVolumes:
  - name: shared-logs
    emptyDir: {}
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: shared-logs
    mountPath: /var/log/app
  - name: tmp
    mountPath: /tmp

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
