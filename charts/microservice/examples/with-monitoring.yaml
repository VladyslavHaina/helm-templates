# Microservice with Prometheus monitoring and all probes
# Usage: helm install my-api ../microservice -f with-monitoring.yaml

app:
  name: catalog-service

image:
  repository: my-registry/catalog-service
  tag: "1.3.0"

replicaCount: 2

probes:
  liveness:
    enabled: true
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: true
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 0
    periodSeconds: 3
    failureThreshold: 40

serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics
  port: http

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8080"

env:
  - name: METRICS_ENABLED
    value: "true"
  - name: METRICS_PORT
    value: "8080"
