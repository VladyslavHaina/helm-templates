{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "worker.fullname" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "worker.selectorLabels" . | nindent 6 }}
  {{- with .Values.networkPolicy.egress }}
  policyTypes:
    - Egress
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
