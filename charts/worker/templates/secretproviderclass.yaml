{{- if .Values.secrets.csi.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "worker.fullname" . }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
spec:
  provider: {{ .Values.secrets.csi.provider }}
  parameters:
    {{- if eq .Values.secrets.csi.provider "aws" }}
    objects: |
      {{- range .Values.secrets.csi.aws.keys }}
      - objectName: {{ .objectName | quote }}
        objectType: secretsmanager
        objectAlias: {{ .objectAlias | quote }}
      {{- end }}
    {{- else if eq .Values.secrets.csi.provider "vault" }}
    roleName: {{ .Values.secrets.csi.vault.roleName | quote }}
    objects: |
      {{- range .Values.secrets.csi.vault.keys }}
      - objectName: {{ .objectName | quote }}
        secretPath: {{ .secretPath | quote }}
        secretKey: {{ .secretKey | quote }}
      {{- end }}
    {{- end }}
{{- end }}
