# Minimal Kafka Connect
# Usage: helm install connect ../kafka-connect -f basic.yaml

app:
  name: kafka-connect

replicaCount: 2

kafka:
  bootstrapServers: "kafka-bootstrap:9092"
  securityProtocol: PLAINTEXT

connect:
  groupId: my-connect-cluster
  configStorageReplicationFactor: 1
  offsetStorageReplicationFactor: 1
  statusStorageReplicationFactor: 1

resources:
  limits:
    cpu: "1"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

jvm:
  heapSize: 1g
