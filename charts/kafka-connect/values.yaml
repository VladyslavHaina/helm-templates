# -- Connector deployment Job (submits connectors to REST API after startup)
connectorDeployJob:
  enabled: false
  image: curlimages/curl:8.7.1
  # -- Wait for Connect REST API to be ready
  waitTimeoutSeconds: 300
  # -- Backoff between retries
  backoffSeconds: 5

# -- Autoscaling
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Health probes
probes:
  liveness:
    enabled: true
    httpGet:
      path: /connectors
      port: rest
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /connectors
      port: rest
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -- Service
service:
  type: ClusterIP
  port: 8083
  annotations: {}

# -- Environment variables
env: []
envFrom: []

# -- Secrets management (cloud-agnostic CSI)
secrets:
  csi:
    enabled: false
    provider: ""
    aws:
      secretArn: ""
      keys: []
  kubernetes:
    enabled: false
    name: ""

# -- Service Account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Pod scheduling
scheduling:
  nodeSelector: {}
  tolerations: []
  podAntiAffinity:
    enabled: true
    type: preferred
    topologyKey: topology.kubernetes.io/zone

# -- Security
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Istio VirtualService (optional)
istio:
  enabled: false
  virtualService:
    hosts: []
    gateways: []

# -- Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s

# -- Network Policy
networkPolicy:
  enabled: false
