# -- Application metadata
app:
  name: kafka-connect

fullnameOverride: ""

# -- Kafka Connect image
image:
  repository: confluentinc/cp-kafka-connect
  tag: "7.7.0"
  pullPolicy: IfNotPresent
  pullSecrets: []

# -- Replicas
replicaCount: 2

# -- Resources
resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 2Gi

# -- Kafka cluster configuration
kafka:
  bootstrapServers: "kafka-bootstrap:9092"
  # -- Security protocol: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
  securityProtocol: PLAINTEXT
  sasl:
    mechanism: SCRAM-SHA-512
    jaasConfig: ""
    credentialsSecret:
      name: ""
      usernameKey: username
      passwordKey: password

# -- Kafka Connect worker configuration
connect:
  groupId: connect-cluster
  configStorageTopic: connect-configs
  offsetStorageTopic: connect-offsets
  statusStorageTopic: connect-status
  configStorageReplicationFactor: 3
  offsetStorageReplicationFactor: 3
  statusStorageReplicationFactor: 3
  keyConverter: org.apache.kafka.connect.json.JsonConverter
  valueConverter: org.apache.kafka.connect.json.JsonConverter
  keyConverterSchemasEnabled: false
  valueConverterSchemasEnabled: false
  pluginPath: /usr/share/java,/usr/share/confluent-hub-components
  restPort: 8083
  # -- Additional worker properties
  extraConfig: {}
    # producer.acks: "all"
    # consumer.max.poll.records: "500"

# -- Schema Registry
schemaRegistry:
  enabled: false
  url: ""

# -- Connector plugins installation (via init container)
# Two approaches: confluent-hub install OR direct JAR download
plugins:
  enabled: false
  # -- Install via confluent-hub (uses the Confluent base image's built-in tool)
  confluentHub: []
    # - name: debezium-connector-mongodb
    #   owner: debezium
    #   version: "2.5.4"
    # - name: kafka-connect-s3
    #   owner: confluentinc
    #   version: "10.5.13"
    # - name: kafka-connect-jdbc
    #   owner: confluentinc
    #   version: "10.7.6"
    # - name: snowflake-kafka-connector
    #   owner: snowflakeinc
    #   version: "2.2.2"
  # -- Download JARs directly (for plugins not on Confluent Hub)
  directDownload: []
    # - url: "https://repo1.maven.org/maven2/io/debezium/debezium-connector-mongodb/2.5.4.Final/debezium-connector-mongodb-2.5.4.Final-plugin.tar.gz"
    #   type: tgz  # jar, tgz, or zip
    # - url: "https://github.com/my-org/my-connector/releases/download/v1.0/my-connector-1.0.jar"
    #   type: jar

# -- JVM configuration
jvm:
  heapSize: 2g
  opts: ""
  gcOpts: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# -- OTEL Java Agent (downloaded via init container)
otelAgent:
  enabled: false
  image: busybox:1.36
  version: "2.4.0"
  endpoint: "http://otel-collector:4317"
  serviceName: kafka-connect
  samplingRatio: "0.1"
  propagators: "tracecontext,baggage"

# -- JMX Prometheus Exporter (downloaded via init container)
jmxExporter:
  enabled: false
  image: busybox:1.36
  version: "1.0.1"
  port: 9404
  rules:
    - pattern: "kafka.connect<type=connect-worker-metrics>([^,]+)"
      name: "kafka_connect_worker_$1"
      type: GAUGE
    - pattern: "kafka.connect<type=connector-metrics, connector=([^,]+)><>([^,]+)"
      name: "kafka_connect_connector_$2"
      type: GAUGE
      labels:
        connector: "$1"
    - pattern: "kafka.connect<type=connector-task-metrics, connector=([^,]+), task=([^,]+)><>([^,]+)"
      name: "kafka_connect_task_$3"
      type: GAUGE
      labels:
        connector: "$1"
        task: "$2"

# -- Connector health monitoring sidecar
connectorMonitor:
  enabled: false
  image: curlimages/curl:8.7.1
  intervalSeconds: 30
  autoRestart: true

# -- Connectors to deploy automatically after startup (via post-install Job)
# These are submitted to the Kafka Connect REST API
