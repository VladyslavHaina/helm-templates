# Minimal dev Flink cluster
# Usage: helm install flink-dev ../flink-jobs -f minimal.yaml

cluster:
  name: flink-dev

mode: session

jobManager:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

taskManager:
  replicas: 1
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

flinkConfiguration:
  taskmanager.numberOfTaskSlots: "2"
  state.backend: hashmap
