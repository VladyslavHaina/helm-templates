  #             paths: ["/api/*"]

# -- PeerAuthentication (mTLS settings)
peerAuthentication:
  enabled: true
  mtls:
    mode: STRICT  # STRICT, PERMISSIVE, DISABLE

# -- Sidecar resource configuration
sidecar:
  enabled: false
  egress:
    - hosts:
        - "./*"
        - "istio-system/*"
