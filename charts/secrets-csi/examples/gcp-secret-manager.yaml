# GCP Secret Manager with Workload Identity
# Usage: helm install secrets ../secrets-csi -f gcp-secret-manager.yaml

provider: gcp

serviceAccount:
  create: true
  name: my-app-sa
  annotations:
    iam.gke.io/gcp-service-account: my-app@my-project.iam.gserviceaccount.com

gcp:
  projectId: my-project
  secrets:
    - resourceName: "projects/my-project/secrets/db-password/versions/latest"
      objectName: db-password
    - resourceName: "projects/my-project/secrets/api-key/versions/latest"
      objectName: api-key
    - resourceName: "projects/my-project/secrets/jwt-secret/versions/3"
      objectName: jwt-secret
  syncAsKubernetesSecret:
    enabled: false
