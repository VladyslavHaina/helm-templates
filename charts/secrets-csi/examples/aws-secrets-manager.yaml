# AWS Secrets Manager with IRSA and JMESPath extraction
# Usage: helm install secrets ../secrets-csi -f aws-secrets-manager.yaml

provider: aws

serviceAccount:
  create: true
  name: my-app-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-app-secrets-role

aws:
  secrets:
    - name: my-app-secrets
      secretArn: "arn:aws:secretsmanager:us-east-1:123456789012:secret:my-app/prod"
      keys:
        - objectName: my-app-secrets
          objectAlias: app-secrets
          jmesPath:
            - path: db_host
              objectAlias: DB_HOST
            - path: db_password
              objectAlias: DB_PASSWORD
            - path: api_key
              objectAlias: API_KEY
  syncAsKubernetesSecret:
    enabled: true
    secretName: my-app-k8s-secret
    type: Opaque
    data:
      - objectName: DB_HOST
        key: db-host
      - objectName: DB_PASSWORD
        key: db-password
      - objectName: API_KEY
        key: api-key
