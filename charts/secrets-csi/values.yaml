nameOverride: ""
fullnameOverride: ""

# -- Cloud provider: aws, azure, gcp, vault
provider: aws

# -- Service Account for workload identity
serviceAccount:
  create: true
  name: ""
  annotations: {}
    # AWS IRSA:
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/my-role
    # GCP Workload Identity:
    # iam.gke.io/gcp-service-account: my-sa@project.iam.gserviceaccount.com
    # Azure Workload Identity:
    # azure.workload.identity/client-id: "client-id"

# -- AWS Secrets Manager
aws:
  secrets:
    - name: my-app-secrets
      secretArn: ""
      # -- Extract individual keys via JMESPath
      keys: []
        # - objectName: full-secret
        #   objectAlias: APP_SECRET
        #   jmesPath:
        #     - path: username
        #       objectAlias: DB_USER
        #     - path: password
        #       objectAlias: DB_PASS
  # -- Sync as Kubernetes Secret (secrets will be in etcd)
  syncAsKubernetesSecret:
    enabled: false
    secretName: my-k8s-secret
    type: Opaque
    data: []
      # - objectName: DB_USER
      #   key: username

# -- Azure Key Vault
azure:
  keyvaultName: ""
  tenantId: ""
  usePodIdentity: false
  useVMManagedIdentity: false
  userAssignedIdentityID: ""
  secrets:
    - name: my-secret
      objectName: my-keyvault-secret
      objectType: secret  # secret, key, cert
      objectVersion: ""
  syncAsKubernetesSecret:
    enabled: false
    secretName: ""
    type: Opaque
    data: []

# -- GCP Secret Manager
gcp:
  projectId: ""
  secrets:
    - resourceName: "projects/PROJECT_ID/secrets/my-secret/versions/latest"
      objectName: my-secret
  syncAsKubernetesSecret:
    enabled: false
    secretName: ""
    type: Opaque
    data: []

# -- HashiCorp Vault
vault:
  address: ""
  roleName: ""
  authMethod: kubernetes  # kubernetes, jwt, approle
  namespace: ""  # Vault namespace (enterprise)
  secrets:
    - secretPath: "secret/data/my-app"
      objectName: my-secret
      secretKey: password
  syncAsKubernetesSecret:
    enabled: false
    secretName: ""
    type: Opaque
    data: []

# -- Volume mount configuration (for pods consuming these secrets)
volumeMount:
  name: secrets-store
  mountPath: /mnt/secrets
  readOnly: true
