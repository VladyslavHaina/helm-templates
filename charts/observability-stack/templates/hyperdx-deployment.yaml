{{- if and (eq .Values.ui.type "hyperdx") .Values.ui.hyperdx.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability-stack.uiName" . }}
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.hyperdx.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "observability-stack.uiName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "observability-stack.uiName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: hyperdx
          image: {{ .Values.ui.hyperdx.image | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: {{ .Values.ui.hyperdx.service.port }}
          env:
            {{- if .Values.ui.hyperdx.apiKey }}
            - name: HYPERDX_API_KEY
              value: {{ .Values.ui.hyperdx.apiKey | quote }}
            {{- end }}
            {{- if .Values.ui.hyperdx.appUrl }}
            - name: HYPERDX_APP_URL
              value: {{ .Values.ui.hyperdx.appUrl | quote }}
            {{- end }}
            {{- if .Values.ui.hyperdx.frontendUrl }}
            - name: FRONTEND_URL
              value: {{ .Values.ui.hyperdx.frontendUrl | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.ui.hyperdx.probes.liveness.path }}
              port: {{ .Values.ui.hyperdx.probes.liveness.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.ui.hyperdx.probes.readiness.path }}
              port: {{ .Values.ui.hyperdx.probes.readiness.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ui.hyperdx.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability-stack.uiName" . }}
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ui.hyperdx.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ include "observability-stack.uiName" . }}
{{- if .Values.ui.hyperdx.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "observability-stack.uiName" . }}
spec:
  minAvailable: {{ .Values.ui.hyperdx.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "observability-stack.uiName" . }}
{{- end }}
{{- end }}
