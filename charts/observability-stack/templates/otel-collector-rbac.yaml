{{- if and .Values.otelCollector.enabled .Values.otelCollector.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "observability-stack.otelName" . }}
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "observability-stack.otelName" . }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "observability-stack.otelName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "observability-stack.otelName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "observability-stack.otelName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
