# Minimal ClickHouse cluster — 1 shard, 2 replicas
# Usage: helm install clickhouse ../clickhouse-cluster -f minimal.yaml

cluster:
  name: analytics

clickhouse:
  image: clickhouse/clickhouse-server:24.8
  topology:
    shards: 1
    replicas: 2
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi
  storage:
    data:
      size: 50Gi
    logs:
      size: 10Gi
  users:
    admin:
      password: "change-me-in-production"
      networks:
        ip:
          - "10.0.0.0/8"

keeper:
  enabled: true
  replicas: 3
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  storage:
    size: 5Gi
