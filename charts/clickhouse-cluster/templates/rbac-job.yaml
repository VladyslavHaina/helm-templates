{{- if .Values.rbacJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "clickhouse-cluster.fullname" . }}-rbac
  labels:
    {{- include "clickhouse-cluster.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacJob.syncWave | quote }}
    argocd.argoproj.io/hook: PostSync
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-clickhouse
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              echo "Waiting for ClickHouse to be ready..."
              until wget -q -O- "http://{{ include "clickhouse-cluster.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.clickhouse.ports.http }}/ping" 2>/dev/null | grep -q "Ok"; do
                echo "ClickHouse not ready, retrying in 5s..."
                sleep 5
              done
              echo "ClickHouse is ready."
      containers:
        - name: rbac-init
          image: {{ .Values.rbacJob.image | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              set -e
              CH_HOST="{{ include "clickhouse-cluster.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local"
              CH_PORT="{{ .Values.clickhouse.ports.native }}"
              {{- range .Values.rbacJob.users }}
              echo "Creating user {{ .name }}..."
              clickhouse-client --host "$CH_HOST" --port "$CH_PORT" -q \
                "CREATE USER IF NOT EXISTS {{ .name }} IDENTIFIED BY '${{"{"}}{{ .identifiedByEnv }}{{"}"}}'"
              {{- end }}
              {{- range .Values.rbacJob.roles }}
              echo "Creating role {{ .name }}..."
              clickhouse-client --host "$CH_HOST" --port "$CH_PORT" -q \
                "CREATE ROLE IF NOT EXISTS {{ .name }}"
              {{- range .grants }}
              clickhouse-client --host "$CH_HOST" --port "$CH_PORT" -q \
                "GRANT {{ . }} TO {{ $.name }}"
              {{- end }}
              {{- range .users }}
              clickhouse-client --host "$CH_HOST" --port "$CH_PORT" -q \
                "GRANT {{ $.name }} TO {{ . }}"
              {{- end }}
              {{- end }}
              {{- range .Values.rbacJob.rowPolicies }}
              echo "Creating row policy {{ .name }}..."
              clickhouse-client --host "$CH_HOST" --port "$CH_PORT" -q \
                "CREATE ROW POLICY IF NOT EXISTS {{ .name }} ON {{ .table }} FOR SELECT USING {{ .condition }} TO {{ join ", " .users }}"
              {{- end }}
              echo "RBAC initialization complete."
          {{- with .Values.rbacJob.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
